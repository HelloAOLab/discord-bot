name: Deployment

on:
    push:
        branches:
            - main

permissions:
    id-token: write # Required for OIDC
    contents: write
    packages: write

jobs:
    build:
        name: Build and Release
        runs-on: ubuntu-latest
        env:
            CI: true
        steps:
            - uses: actions/checkout@v1
            - name: Build Docker
              run: |
                  echo "Building..."
                  docker build -t "ghcr.io/helloaolab/discord-bot:latest" .
            - name: Login to GHCR
              run: |
                  echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            - name: Publish GHCR
              run: |
                  DOCKER_TAG=`git rev-parse HEAD`
                  docker tag ghcr.io/helloaolab/discord-bot:latest "ghcr.io/helloaolab/discord-bot:h${DOCKER_TAG:8}"
                  docker push ghcr.io/helloaolab/discord-bot:latest
                  docker push "ghcr.io/helloaolab/discord-bot:h${DOCKER_TAG:8}"